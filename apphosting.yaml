env:
  # Genkit Google GenAI plugin looks for GEMINI_API_KEY (or GOOGLE_API_KEY)
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
  - variable: POS_EXTERNAL_API_KEY
    secret: POS_EXTERNAL_API_KEY
    availability:
      - RUNTIME
  # Shared secret required by /api/cron/* routes. Consumed by Cloud Scheduler
  # jobs as `Authorization: Bearer <CRON_SECRET>`.
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
  - variable: CUSTOMER_JOIN_TOKEN_SECRET
    secret: CUSTOMER_JOIN_TOKEN_SECRET
    availability:
      - RUNTIME
  # OpenWeatherMap key used by /api/cron/log-weather to fetch each store's
  # forecast. The env var name is what the code reads; `secret` is the
  # Secret Manager secret name (must exist + be granted before rollout).
  - variable: OPENWEATHER_API_KEY
    secret: OPENWEATHER_API_KEY
    availability:
      - RUNTIME