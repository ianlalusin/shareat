name: Build Android APK

on:
  push:
    branches: [sev5_advanced, sev6]
    paths:
      # Capacitor config (server URL, plugins, app id, etc.)
      - 'capacitor.config.ts'
      - 'capacitor.config.json'
      # Native Android project
      - 'android/**'
      # Dependency changes (Capacitor plugins, core)
      - 'package.json'
      - 'package-lock.json'
      # The workflow itself
      - '.github/workflows/build-apk.yml'
  # Always allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create required Android assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharEat-POS-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
